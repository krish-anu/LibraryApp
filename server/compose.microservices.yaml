services:
  db:
    image: postgres:16-alpine
    container_name: libraryapp-db
    environment:
      POSTGRES_DB: ${DB_NAME:-libraryapp}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-libraryapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: libraryapp-auth-service
    env_file:
      - .env
    environment:
      DATABASE_URL: ""
      DB_HOST: db
      DB_PORT: 5432
      DB_SSLMODE: disable
    command: uvicorn services.auth_service.main:app --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  catalog-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: libraryapp-catalog-service
    env_file:
      - .env
    environment:
      DATABASE_URL: ""
      DB_HOST: db
      DB_PORT: 5432
      DB_SSLMODE: disable
    command: uvicorn services.catalog_service.main:app --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  users-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: libraryapp-users-service
    env_file:
      - .env
    environment:
      DATABASE_URL: ""
      DB_HOST: db
      DB_PORT: 5432
      DB_SSLMODE: disable
    command: uvicorn services.users_service.main:app --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  circulation-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: libraryapp-circulation-service
    env_file:
      - .env
    environment:
      DATABASE_URL: ""
      DB_HOST: db
      DB_PORT: 5432
      DB_SSLMODE: disable
    command: uvicorn services.circulation_service.main:app --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  settings-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: libraryapp-settings-service
    env_file:
      - .env
    environment:
      DATABASE_URL: ""
      DB_HOST: db
      DB_PORT: 5432
      DB_SSLMODE: disable
    command: uvicorn services.settings_service.main:app --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  kong:
    image: kong:3.7
    container_name: libraryapp-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_LOG_LEVEL: notice
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    volumes:
      - ./gateway/kong.microservices.yml:/etc/kong/kong.yml:ro
    depends_on:
      auth-api:
        condition: service_healthy
      catalog-api:
        condition: service_healthy
      users-api:
        condition: service_healthy
      circulation-api:
        condition: service_healthy
      settings-api:
        condition: service_healthy
    ports:
      - "8080:8000"
      - "8001:8001"
    restart: unless-stopped

volumes:
  postgres_data:
