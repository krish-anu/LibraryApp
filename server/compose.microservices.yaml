services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${COMPOSE_DB_NAME:-libraryapp}
      POSTGRES_USER: ${COMPOSE_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${COMPOSE_DB_PASSWORD:-postgres}
    ports:
      - "${DB_PUBLISHED_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${COMPOSE_DB_USER:-postgres} -d ${COMPOSE_DB_NAME:-libraryapp}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ""
      DB_USER: ${COMPOSE_DB_USER:-postgres}
      DB_PASSWORD: ${COMPOSE_DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${COMPOSE_DB_NAME:-libraryapp}
      DB_SSLMODE: disable
    command: uvicorn services.auth_service.main:app --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8101:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

