_format_version: "3.0"
_transform: true

services:
  - name: auth-service
    url: http://auth-api:8000
    routes:
      - name: auth-route
        paths:
          - /auth
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS

  - name: catalog-service
    url: http://catalog-api:8000
    routes:
      - name: catalog-route
        paths:
          - /books
          - /categories
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS

  - name: users-service
    url: http://users-api:8000
    routes:
      - name: users-route
        paths:
          - /users
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS

  - name: circulation-service
    url: http://circulation-api:8000
    routes:
      - name: circulation-route
        paths:
          - /loans
          - /reservations
          - /favorites
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS

  - name: settings-service
    url: http://settings-api:8000
    routes:
      - name: settings-route
        paths:
          - /settings
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS

plugins:
  - name: request-size-limiting
    config:
      allowed_payload_size: 10
      size_unit: megabytes
      require_content_length: false

  - name: rate-limiting
    config:
      minute: 300
      policy: local

  - name: cors
    config:
      origins:
        - http://localhost:3000
        - http://127.0.0.1:3000
        - http://localhost:8081
        - http://127.0.0.1:8081
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - Accept
        - Origin
        - X-Requested-With
      exposed_headers:
        - X-RateLimit-Limit-Minute
        - X-RateLimit-Remaining-Minute
      credentials: true
      max_age: 3600
