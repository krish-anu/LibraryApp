_format_version: "3.0"

plugins:    
- name: rate-limiting
  config:
    minute: 10
    limit_by: consumer
    policy: local

_transform: true

services:
  - name: library-backend
    url: http://libraryapp-server:8000
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    routes:
      - name: library-backend-route
        paths:
          - /backend
          - /api
        strip_path: true
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
    plugins:
      - name: request-size-limiting
        config:
          allowed_payload_size: 10
          size_unit: megabytes
          require_content_length: false
      - name: rate-limiting
        config:
          minute: 300
          policy: local
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - Accept
            - Origin
            - X-Requested-With
          exposed_headers:
            - X-RateLimit-Limit-Minute
            - X-RateLimit-Remaining-Minute
          credentials: true
          max_age: 3600
