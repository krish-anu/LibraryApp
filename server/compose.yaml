services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ENV_FILE: .env.local
      DB_HOST: postgres
      DB_PORT: 5432
      # Keep the API credentials aligned with the local Postgres service.
      # Values from .env.local are intended for non-Compose connections and
      # may point at a different database.
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: libraryapp
      DB_SSLMODE: disable
    env_file:
      - .env.local
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
