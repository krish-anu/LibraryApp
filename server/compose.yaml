services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: libraryapp-server
    env_file:
      - .env
    environment:
      DATABASE_URL: ""
      DB_HOST: db
      DB_PORT: 5432
      DB_SSLMODE: disable
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  db:
    image: postgres:16-alpine
    container_name: libraryapp-db
    environment:
      POSTGRES_DB: ${DB_NAME:-libraryapp}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-libraryapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
